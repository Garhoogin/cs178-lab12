<!-- templates/analyze.html -->
<html>
<head>
    <title>Word Analysis</title>
    <style>
        body {
            font-family: Sans-Serif;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #fff0f4;
            color: #503;
        }
        h1 {
            font-size: 2.5em;
            color: #ee0066;
            margin-bottom: 0;
        }
        img {
            margin-top: 20px;
            max-width: 600px;
        }
        a {
            display: inline-block;
            color: #6600cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
            color: #ff00ee;
        }
        .nav {
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
  <h1>You entered: <strong>{{ word }}</strong></h1>
  <hr/>
  <p>Characters: {{ num_chars }}</p>
  <p>Vowels: {{ num_vowels }}</p>
  <p>Reversed: {{ word_rev }}</p>
</body>
</html>
